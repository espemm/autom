name: Prova_Pylint

on:
  branches: [main, develop]
    paths:
      - 'src/**/*.py'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**/*.py'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.12"]
    steps:
    - uses: actions/checkout@v4
      with:
          fetch-depth: 0
    - name: Actualitzar Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Instal·lar dependències
      run: |
        python -m pip install --upgrade pip
        pip install pylint
    - name: Analitzar codi modificat amb pylint
      shell: bash
      run: |
        set -euo pipefail
        git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- 'src/**/*.py' > files.txt || true

        if [[ ! -s files.txt ]]; then
            echo "No hi ha arxius .py modificats en src."
            exit 0
        fi

        mapfile -t files < files.txt
        pylint --output-format=github "${files[@]}"
